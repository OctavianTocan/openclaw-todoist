name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Do NOT read secrets on PRs from forks. Skipping test step entirely —
    # no API key should ever reach an untrusted CI run.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
        env:
          TODOIST_API_TOKEN: ${{ secrets.TODOIST_API_TOKEN }}